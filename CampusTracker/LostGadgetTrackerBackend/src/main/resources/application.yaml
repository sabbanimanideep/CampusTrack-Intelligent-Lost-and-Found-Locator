server:
  port: 8089

spring:
  application:
    name: GadgetTracker
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/GadgetTracker
    username: root
    password: root1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  websocket:
    message-broker:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
app:
  upload:
    dir: uploads
  cors:
    allowed-origin: http://localhost:5173

logging:
  level:
    org.springframework.web: INFO
    org.springframework.messaging: DEBUG
    org.hibernate.SQL: DEBUG